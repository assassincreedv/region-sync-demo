sync:
  current-region: NA
  remote-region: EU
  database-name: app_na
  tables:
    companies:
      name: companies
      business-key-field: companyCode
      dedup-on-insert: true
      conflict-strategy: FIRST_WRITER_WINS
  conflict:
    auto-resolve-enabled: true
    tie-breaker-strategy: REGION_PRIORITY

sync-topics:
  remote-cdc-topics: eu.cdc.app_eu.companies
  rejection-inbox: sync.rejection.na
  rejection-outbox: sync.rejection.eu
  dead-letter-topic: sync.dlt.na

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/app_na?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
  kafka:
    consumer:
      group-id: sync-consumer-na